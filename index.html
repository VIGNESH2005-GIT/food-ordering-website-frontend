<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>project</title>
<link rel="stylesheet" href="/src/style.css">
</head>
<body class="h-screen flex">
 
  <div class="flex-1 flex items-center justify-center bg-gray-200">
    <div class="w-96 bg-white p-8 rounded-lg shadow-lg border">
      <form id="log" class="space-y-6">
        <h2 class="text-4xl text-blue-500 font-bold">Login</h2>
        <h2 class="text-4xl font-bold">Welcome!</h2>
        <h6 class="text-base">Enter your email and password to login</h6>

        <input id="email" placeholder="Enter mail"
               class="w-full border p-2 rounded-lg">

        <input id="password" placeholder="Enter password"
               class="w-full border p-2 rounded-lg">

        <div class="flex gap-4 mt-6">
          <button type="submit" class="flex-1 py-2 border text-black rounded-lg hover:bg-gray-400">
            Login
          </button>
          <button type="reset" class="flex-1 py-2 border text-black rounded-lg hover:bg-gray-400">
            Reset
          </button>
        </div>
      </form>
    </div>
  </div>

<div class="flex-1">
    <img src="src/img.png" class="w-full h-screen object-cover">
  </div>
 
</body>
<script src="login.js"></script>
</html>
